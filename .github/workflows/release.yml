name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Changelog
        id: changelog
        run: |
          # 获取上一个标签
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # 如果没有上一个标签，获取所有提交
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # 获取两个标签之间的提交
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREVIOUS_TAG}..HEAD)
          fi
          
          # 写入文件
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "$CHANGELOG" >> CHANGELOG.md
          
          # 设置输出
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-images:
    name: Build Release Images
    runs-on: ubuntu-latest
    needs: [create-release]
    strategy:
      matrix:
        app: [controller, website-template-frontend, website-template-admin, website-template-backend,
              store-app-frontend, store-app-admin, store-app-backend,
              cms-app-frontend, cms-app-admin, cms-app-backend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Determine context
        id: context
        run: |
          if [[ "${{ matrix.app }}" == "controller" ]]; then
            echo "path=./framework/controller" >> $GITHUB_OUTPUT
          else
            # Parse app name to get path
            APP_NAME=$(echo "${{ matrix.app }}" | sed 's/-frontend//' | sed 's/-admin//' | sed 's/-backend//')
            COMPONENT=$(echo "${{ matrix.app }}" | grep -oE '(frontend|admin|backend)$' || echo "")
            if [ -n "$COMPONENT" ]; then
              echo "path=./apps/${APP_NAME}/${COMPONENT}" >> $GITHUB_OUTPUT
            else
              echo "path=./apps/${APP_NAME}" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-version:
    name: Update Version Files
    runs-on: ubuntu-latest
    needs: [create-release]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update version in package.json files
        run: |
          VERSION=${{ github.ref_name }}
          # 去掉 v 前缀
          VERSION=${VERSION#v}
          
          # 更新 framework/controller
          if [ -f "framework/controller/package.json" ]; then
            cd framework/controller
            npm version $VERSION --no-git-tag-version || true
            cd ../..
          fi
          
          # 更新所有应用的 package.json
          for app in apps/*/; do
            if [ -f "$app/backend/package.json" ]; then
              cd "$app/backend"
              npm version $VERSION --no-git-tag-version || true
              cd ../../..
            fi
            if [ -f "$app/frontend/package.json" ]; then
              cd "$app/frontend"
              npm version $VERSION --no-git-tag-version || true
              cd ../../..
            fi
            if [ -f "$app/admin/package.json" ]; then
              cd "$app/admin"
              npm version $VERSION --no-git-tag-version || true
              cd ../../..
            fi
          done
      
      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: bump version to ${{ github.ref_name }}" || echo "No changes to commit"
          git push || echo "Nothing to push"
