# BuildAI Framework - StoreApp
# Docker Compose 单应用配置

version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: store-frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    networks:
      - store-network
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: store-admin
    restart: unless-stopped
    ports:
      - "8091:80"
    networks:
      - store-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: store-backend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-store_buildai}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DATABASE=${DB_DATABASE:-storeapp}
      - JWT_SECRET=${JWT_SECRET:-store_jwt_secret}
    networks:
      - store-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    container_name: store-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-store_buildai}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_DATABASE:-storeapp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - store-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-store_buildai} -d ${DB_DATABASE:-storeapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  store-network:
    driver: bridge

volumes:
  postgres-data:
  backend-uploads:
