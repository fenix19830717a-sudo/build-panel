version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: logcollector-db
    environment:
      POSTGRES_USER: logcollector
      POSTGRES_PASSWORD: logcollector123
      POSTGRES_DB: logcollector
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logcollector -d logcollector"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: logcollector-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: logcollector
      DB_PASSWORD: logcollector123
      DB_NAME: logcollector
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: logcollector-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
