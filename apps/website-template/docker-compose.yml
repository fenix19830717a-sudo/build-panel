# BuildAI Framework - WebsiteTemplate
# 单应用 Docker Compose 配置

version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wt-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    networks:
      - website-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 管理后台服务
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: wt-admin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    networks:
      - website-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wt-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-buildai}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DATABASE=${DB_DATABASE:-website_template}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
      - JWT_EXPIRES_IN=7d
    networks:
      - website-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - backend-uploads:/app/uploads

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: wt-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-buildai}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_DATABASE:-website_template}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - website-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-buildai} -d ${DB_DATABASE:-website_template}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  website-network:
    driver: bridge

volumes:
  postgres-data:
  backend-uploads:
