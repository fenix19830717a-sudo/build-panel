version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=dbbackup
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BACKUP_DIR=/app/backups
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - backup-data:/app/backups
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - dbbackup-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dbbackup
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dbbackup-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - dbbackup-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dbbackup-network

  # Example target databases for testing
  postgres-target:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=target
      - POSTGRES_PASSWORD=targetpass
      - POSTGRES_DB=targetdb
    ports:
      - "5433:5432"
    networks:
      - dbbackup-network

  mysql-target:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_USER=target
      - MYSQL_PASSWORD=targetpass
      - MYSQL_DATABASE=targetdb
    ports:
      - "3307:3306"
    networks:
      - dbbackup-network

volumes:
  backup-data:
  postgres-data:
  redis-data:
  minio-data:

networks:
  dbbackup-network:
    driver: bridge
