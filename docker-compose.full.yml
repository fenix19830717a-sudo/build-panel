# BuildAI Framework - Full Stack Docker Compose
# 所有应用统一部署配置

version: '3.8'

# ===================
# 共享网络
# ===================
networks:
  buildai-network:
    driver: bridge
  monitoring-network:
    driver: bridge

# ===================
# 共享存储卷
# ===================
volumes:
  # 数据库数据
  postgres-data:
  redis-data:
  
  # 应用数据
  wt-postgres-data:
  wt-uploads:
  store-postgres-data:
  store-uploads:
  cms-postgres-data:
  cms-uploads:
  
  # 监控和日志
  grafana-data:
  prometheus-data:
  log-data:
  
  # 备份存储
  backup-data:

services:
  # ===================
  # 基础设施服务
  # ===================
  
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: buildai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx-ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    networks:
      - buildai-network
    depends_on:
      - controller
      - wt-frontend
      - wt-admin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL 主数据库 (BuildAI Controller)
  postgres:
    image: postgres:16-alpine
    container_name: buildai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-buildai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-buildai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - buildai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-buildai} -d ${DB_DATABASE:-buildai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: buildai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - buildai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===================
  # BuildAI Controller
  # ===================
  controller:
    build:
      context: ./framework/controller
      dockerfile: Dockerfile
    container_name: buildai-controller
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-buildai}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-buildai}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret}
    networks:
      - buildai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===================
  # WebsiteTemplate
  # ===================
  wt-postgres:
    image: postgres:16-alpine
    container_name: wt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WT_DB_USERNAME:-wt_buildai}
      POSTGRES_PASSWORD: ${WT_DB_PASSWORD:-wt_password}
      POSTGRES_DB: ${WT_DB_DATABASE:-website_template}
    volumes:
      - wt-postgres-data:/var/lib/postgresql/data
    networks:
      - buildai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WT_DB_USERNAME:-wt_buildai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  wt-backend:
    build:
      context: ./apps/website-template/backend
      dockerfile: Dockerfile
    container_name: wt-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: wt-postgres
      DB_PORT: 5432
      DB_USERNAME: ${WT_DB_USERNAME:-wt_buildai}
      DB_PASSWORD: ${WT_DB_PASSWORD:-wt_password}
      DB_DATABASE: ${WT_DB_DATABASE:-website_template}
      JWT_SECRET: ${WT_JWT_SECRET:-wt_jwt_secret}
    networks:
      - buildai-network
    depends_on:
      wt-postgres:
        condition: service_healthy
    volumes:
      - wt-uploads:/app/uploads

  wt-frontend:
    build:
      context: ./apps/website-template/frontend
      dockerfile: Dockerfile
    container_name: wt-frontend
    restart: unless-stopped
    networks:
      - buildai-network
    depends_on:
      - wt-backend

  wt-admin:
    build:
      context: ./apps/website-template/admin
      dockerfile: Dockerfile
    container_name: wt-admin
    restart: unless-stopped
    networks:
      - buildai-network
    depends_on:
      - wt-backend

  # ===================
  # StoreApp
  # ===================
  store-postgres:
    image: postgres:16-alpine
    container_name: store-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STORE_DB_USERNAME:-store_buildai}
      POSTGRES_PASSWORD: ${STORE_DB_PASSWORD:-store_password}
      POSTGRES_DB: ${STORE_DB_DATABASE:-storeapp}
    volumes:
      - store-postgres-data:/var/lib/postgresql/data
    networks:
      - buildai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORE_DB_USERNAME:-store_buildai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  store-backend:
    build:
      context: ./apps/store-app/backend
      dockerfile: Dockerfile
    container_name: store-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: store-postgres
      DB_PORT: 5432
      DB_USERNAME: ${STORE_DB_USERNAME:-store_buildai}
      DB_PASSWORD: ${STORE_DB_PASSWORD:-store_password}
      DB_DATABASE: ${STORE_DB_DATABASE:-storeapp}
      JWT_SECRET: ${STORE_JWT_SECRET:-store_jwt_secret}
    networks:
      - buildai-network
    depends_on:
      store-postgres:
        condition: service_healthy
    volumes:
      - store-uploads:/app/uploads

  store-frontend:
    build:
      context: ./apps/store-app/frontend
      dockerfile: Dockerfile
    container_name: store-frontend
    restart: unless-stopped
    networks:
      - buildai-network
    depends_on:
      - store-backend

  store-admin:
    build:
      context: ./apps/store-app/admin
      dockerfile: Dockerfile
    container_name: store-admin
    restart: unless-stopped
    networks:
      - buildai-network
    depends_on:
      - store-backend

  # ===================
  # CMSApp
  # ===================
  cms-postgres:
    image: postgres:16-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CMS_DB_USERNAME:-cms_buildai}
      POSTGRES_PASSWORD: ${CMS_DB_PASSWORD:-cms_password}
      POSTGRES_DB: ${CMS_DB_DATABASE:-cmsapp}
    volumes:
      - cms-postgres-data:/var/lib/postgresql/data
    networks:
      - buildai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CMS_DB_USERNAME:-cms_buildai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms-backend:
    build:
      context: ./apps/cms-app/backend
      dockerfile: Dockerfile
    container_name: cms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: cms-postgres
      DB_PORT: 5432
      DB_USERNAME: ${CMS_DB_USERNAME:-cms_buildai}
      DB_PASSWORD: ${CMS_DB_PASSWORD:-cms_password}
      DB_DATABASE: ${CMS_DB_DATABASE:-cmsapp}
      JWT_SECRET: ${CMS_JWT_SECRET:-cms_jwt_secret}
    networks:
      - buildai-network
    depends_on:
      cms-postgres:
        condition: service_healthy
    volumes:
      - cms-uploads:/app/uploads

  cms-frontend:
    build:
      context: ./apps/cms-app/frontend
      dockerfile: Dockerfile
    container_name: cms-frontend
    restart: unless-stopped
    networks:
      - buildai-network
    depends_on:
      - cms-backend

  cms-admin:
    build:
      context: ./apps/cms-app/admin
      dockerfile: Dockerfile
    container_name: cms-admin
    restart: unless-stopped
    networks:
      - buildai-network
    depends_on:
      - cms-backend

  # ===================
  # ChatService
  # ===================
  chat-service:
    build:
      context: ./apps/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - buildai-network
    depends_on:
      - redis

  # ===================
  # 监控服务
  # ===================
  sitemonitor:
    build:
      context: ./apps/sitemonitor
      dockerfile: Dockerfile
    container_name: buildai-sitemonitor
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-buildai}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-buildai}
    networks:
      - buildai-network
      - monitoring-network
    depends_on:
      - postgres

  logcollector:
    build:
      context: ./apps/logcollector
      dockerfile: Dockerfile
    container_name: buildai-logcollector
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - buildai-network
      - monitoring-network
    volumes:
      - log-data:/app/logs
      - /var/log:/host/var/log:ro
    depends_on:
      - redis

  # ===================
  # 运维服务
  # ===================
  dbbackup:
    build:
      context: ./apps/dbbackup
      dockerfile: Dockerfile
    container_name: buildai-dbbackup
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: 30
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${DB_USERNAME:-buildai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      # 可选：云存储配置
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
    networks:
      - buildai-network
    volumes:
      - backup-data:/backups
    depends_on:
      - postgres

  server-manager:
    build:
      context: ./apps/server-manager
      dockerfile: Dockerfile
    container_name: buildai-server-manager
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-buildai}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-buildai}
      DOCKER_HOST: unix:///var/run/docker.sock
    networks:
      - buildai-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - postgres

  # ===================
  # 可选：Prometheus + Grafana 监控
  # ===================
  prometheus:
    image: prom/prometheus:latest
    container_name: buildai-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: buildai-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-network
    profiles:
      - monitoring
