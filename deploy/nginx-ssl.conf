# BuildAI Framework - Nginx SSL Configuration
# SSL/TLS 配置 - 需要配合主 nginx.conf 使用

# SSL 默认配置
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# HSTS (启用前确保 HTTPS 已正常工作)
# add_header Strict-Transport-Security "max-age=63072000" always;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;

# 安全头
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# SSL 证书路径 (使用 Let's Encrypt 示例)
# ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

# 示例：带 SSL 的 Controller 配置
server {
    listen 443 ssl http2;
    server_name controller.your-domain.com;

    ssl_certificate /etc/nginx/ssl/controller.crt;
    ssl_certificate_key /etc/nginx/ssl/controller.key;

    location / {
        proxy_pass http://controller:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# HTTP 到 HTTPS 重定向
server {
    listen 80;
    server_name controller.your-domain.com;
    return 301 https://$server_name$request_uri;
}
